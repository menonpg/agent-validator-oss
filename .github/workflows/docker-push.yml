name: Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t agent-validator:ci .

      - name: Smoke test — health endpoint
        run: |
          docker run -d --name av -p 8080:8080 agent-validator:ci
          sleep 5
          curl -f http://localhost:8080/health
          docker stop av
