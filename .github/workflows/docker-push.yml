name: Build & Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build image
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/agent-validator:${{ github.sha }} \
                       -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/agent-validator:latest .

      - name: Push image
        run: |
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/agent-validator:${{ github.sha }}
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/agent-validator:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy agent-validator \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/agent-validator:${{ github.sha }} \
            --region us-central1 \
            --platform managed \
            --quiet
        
      - name: Output URL
        run: |
          echo "Deployed: $(gcloud run services describe agent-validator --region us-central1 --format='value(status.url)')"
